server:
  port: 8761

spring:
  application:
    name: service-registry
  security:
    user:
      name: ${EUREKA_USER:eureka}            # Aucune valeur en dur
      password: ${EUREKA_PASSWORD:eureka123}    # 100 % externalisé

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:localhost}
    lease-renewal-interval-in-seconds: 30        # Heartbeat toutes les 30s
    lease-expiration-duration-in-seconds: 90     # Délai avant éviction
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_USER:eureka}:${EUREKA_PASSWORD:eureka123}@localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0           # Pas d'attente au démarrage
    enable-self-preservation: false              # Désactivé en DEV (cf. profils)
    renewal-threshold-update-interval-ms: 900000 # 15 minutes
    eviction-interval-timer-in-ms: 60000         # Vérification toutes les 60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always            # Debug en dev

logging:
  level:
    com.netflix.eureka: INFO
    org.springframework.security: INFO   # Trace les accès refusés