version: '3.9'

# ======================================================================
# MOUSSEFER — Production Override Docker Compose
# ======================================================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ======================================================================

services:

  # ==================== INFRASTRUCTURE ====================

  zookeeper:
    restart: always

  kafka:
    restart: always
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824

  kafka-ui:
    restart: always

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== BASES DE DONNÉES (xxx_db, root/1234) ====================

  mysql-auth:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: "1234"
    command: --max_connections=200 --default-storage-engine=InnoDB --character-set-server=utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 30s
      timeout: 10s
      retries: 5

  mysql-user:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_svc
