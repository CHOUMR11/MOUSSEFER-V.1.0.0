version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# MOUSSEFER — Infrastructure locale pour développement IDE (IntelliJ)
# ─────────────────────────────────────────────────────────────────────────────
# Lance uniquement les conteneurs d'infrastructure (MySQL, Kafka, Redis, MinIO, Kafka UI).
# Les microservices Spring Boot sont exécutés directement depuis l'IDE.
#
# Usage : docker-compose -f docker-compose-infra.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

networks:
  moussefer-net:
    driver: bridge

services:

  # ── ZOOKEEPER ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: moussefer-zookeeper
    networks:
      - moussefer-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── KAFKA ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: moussefer-kafka
    networks:
      - moussefer-net
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── KAFKA UI ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: moussefer-kafka-ui
    networks:
      - moussefer-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: moussefer
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── REDIS ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: moussefer-redis
    networks:
      - moussefer-net
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MINIO (stockage PDF factures et documents) ────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: moussefer-minio
    networks:
      - moussefer-net
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MYSQL — AUTH ──────────────────────────────────────────────────────────────
  mysql-auth:
    image: mysql:8.3
    container_name: moussefer-mysql-auth
    networks:
      - moussefer-net
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MYSQL — USER ──────────────────────────────────────────────────────────────
  mysql-user:
