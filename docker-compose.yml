      interval: 10s
      timeout: 5s
      retries: 5

  mysql-payment:
    image: mysql:8.3
    container_name: moussefer-mysql-payment
    networks: [moussefer-net]
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: payment_db
      MYSQL_USER: pay_svc
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql-payment:/var/lib/mysql
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-notification:
    image: mysql:8.3
    container_name: moussefer-mysql-notif
    networks: [moussefer-net]
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: notification_db
      MYSQL_USER: notif_svc
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql-notification:/var/lib/mysql
    ports:
      - "3311:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-chat:
    image: mysql:8.3
