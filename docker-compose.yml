  # ──────────────────────── SPRING SERVICES (hardcoded DB passwords) ──────────────────────────────

  service-registry:
    build: ./service-registry
    container_name: moussefer-registry
    networks: [moussefer-net]
    ports:
      - "8761:8761"
    environment:
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: moussefer-gateway
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED}

  auth-service:
    build: ./auth-service
    container_name: moussefer-auth
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-auth:3306/auth_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      KAFKA_BOOTSTRAP: kafka:29092
      USER_SERVICE_URL: http://user-service:8082

  user-service:
