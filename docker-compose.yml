    container_name: moussefer-payment
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-payment:3306/payment_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: pay_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RESERVATION_SERVICE_URL: http://reservation-service:8084
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
