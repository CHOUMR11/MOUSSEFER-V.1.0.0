version: '3.9'

networks:
  moussefer-net:
    driver: bridge

volumes:
  mysql-auth:
  mysql-user:
  mysql-trajet:
  mysql-reservation:
  mysql-payment:
  mysql-notification:
  mysql-chat:
  mysql-voyage:
  mysql-demande:
  mysql-avis:
  mysql-station:
  mysql-analytics:
  mysql-admin:
  mysql-loyalty:
  mysql-banner:
  redis-data:
  kafka-data:
  zookeeper-data:
  minio-data:

services:

  # ─────────────────────────── INFRASTRUCTURE ────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: moussefer-zookeeper
    networks: [moussefer-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: moussefer-kafka
    networks: [moussefer-net]
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: moussefer-kafka-ui
    networks: [moussefer-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: moussefer
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7.2-alpine
    container_name: moussefer-redis
    networks: [moussefer-net]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: moussefer-minio
    networks: [moussefer-net]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────── PER-SERVICE DATABASES (hardcoded 1234) ─────────────────────────

  mysql-auth:
    image: mysql:8.3
    container_name: moussefer-mysql-auth
    networks: [moussefer-net]
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql-auth:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-user:
    image: mysql:8.3
    container_name: moussefer-mysql-user
    networks: [moussefer-net]
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: user_db
      MYSQL_USER: user_svc
      MYSQL_PASSWORD: "1234"
    volumes:
      - mysql-user:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
