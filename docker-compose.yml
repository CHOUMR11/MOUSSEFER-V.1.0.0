      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: invoices
      MINIO_ENABLED: "true"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      PAYMENT_SERVICE_URL: http://payment-service:8085
      USER_SERVICE_URL: http://user-service:8082

  demande-service:
    build: ./demande-service
    container_name: moussefer-demande
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-demande:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-demande:3306/demande_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: demande_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      DEMANDE_THRESHOLD: 4
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      TRAJET_SERVICE_URL: http://trajet-service:8083

  avis-service:
    build: ./avis-service
    container_name: moussefer-avis
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-avis:
        condition: service_healthy
      kafka:
