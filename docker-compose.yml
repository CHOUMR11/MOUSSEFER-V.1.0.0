    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-voyage:3306/voyage_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: voyage_svc
