        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-chat:3306/chat_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: chat_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4200}

  voyage-service:
    build: ./voyage-service
    container_name: moussefer-voyage
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-voyage:
        condition: service_healthy
