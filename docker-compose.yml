    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-notification:3306/notification_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: notif_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-placeholder}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      USER_SERVICE_URL: http://user-service:8082
      DEMANDE_SERVICE_URL: http://demande-service:8089
      ADMIN_USER_ID: ${ADMIN_USER_ID:-admin-uuid}

  chat-service:
    build: ./chat-service
    container_name: moussefer-chat
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-chat:
