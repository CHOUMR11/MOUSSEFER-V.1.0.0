      timeout: 5s
      retries: 5

  # ──────────────────── ADDITIONAL DATABASES (hardcoded 1234) ─────────────────────────────────

  mysql-station:
    image: mysql:8.3
    container_name: moussefer-mysql-station
    networks: [moussefer-net]
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: station_db
      MYSQL_USER: station_svc
      MYSQL_PASSWORD: "1234"
