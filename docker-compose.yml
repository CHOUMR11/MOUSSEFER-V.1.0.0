        condition: service_healthy
      mysql-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-user:3306/user_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: user_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: user-documents

  trajet-service:
    build: ./trajet-service
    container_name: moussefer-trajet
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-trajet:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-trajet:3306/trajet_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: trajet_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

  reservation-service:
    build: ./reservation-service
    container_name: moussefer-reservation
    networks: [moussefer-net]
    depends_on:
      service-registry:
        condition: service_healthy
      mysql-reservation:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservation:3306/reservation_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&authenticationPlugins=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin&defaultAuthenticationPlugin=com.mysql.cj.protocol.a.authentication.MysqlNativePasswordPlugin
      SPRING_DATASOURCE_USERNAME: resa_svc
      SPRING_DATASOURCE_PASSWORD: "1234"
      EUREKA_URI: http://eureka:${EUREKA_PASSWORD}@service-registry:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
      DRIVER_RESPONSE_TIMEOUT_MINUTES: 15
      DRIVER_REMINDER_MINUTES: 5
      ADMIN_NOTIFICATION_MINUTES: 8
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      TRAJET_SERVICE_URL: http://trajet-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8085

  payment-service:
